name: dove-s2

runtime:
  accelerate_config: accelerate_config.yaml
  entrypoint: train.py
  tee: true

environment:
  TOKENIZERS_PARALLELISM: "false"

args:
  model_path: checkpoint/DOVE-s1/ckpt-10000-sft
  model_name: dove-s2
  model_type: real-sr-image-video
  training_type: sft

  output_dir: checkpoint/DOVE-s2
  report_to: wandb

  data_root: ../datasets/train
  video_column: ../datasets/train/HQ-VSR.txt
  image_data_root: ../datasets/train
  image_column: ../datasets/train/DIV2K_train_HR.txt
  train_resolution: 2x320x640
  image_ratio: 0.8

  train_epochs: 10
  train_steps: 500
  seed: 42
  batch_size: 2
  gradient_accumulation_steps: 1
  mixed_precision: bf16
  learning_rate: 5.0e-6
  gradient_checkpointing: true
  max_grad_norm: 0.1
  lr_scheduler: constant_with_warmup

  num_workers: 8
  pin_memory: true
  nccl_timeout: 1800
  stastic_frequency: 100

  checkpointing_steps: 100
  checkpointing_limit: 3

  do_validation: true
  validation_dir: ../datasets/test/UDM10
  validation_steps: 500
  validation_prompts: null
  validation_images: null
  validation_videos: LQ-Video.txt
  validation_ref_videos: GT-Video.txt
  gen_fps: 8
  raw_test: true
  num_inference_steps: 1
  eval_metric_list: psnr,ssim,lpips,dists,clipiqa

  is_latent: false
  is_cache: true
  empty_prompt: true
  prompt_cache: ../pretrained_models/prompt_embeddings
  sr_noise_step: 399
  noise_step: 0
  degradation_config: configs/degradation_image_video.yaml

  use_perceptual_loss: true
  dists_weight: 1.0
  frame_diff_weight: 1.0
